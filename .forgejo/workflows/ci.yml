name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Mirror of .github/workflows/ci.yml for Forgejo Actions / Codeberg CI.
# Keep the two files in sync.

jobs:
  build:
    runs-on: docker
    container:
      image: docker.io/library/debian:bookworm
    strategy:
      fail-fast: false
      matrix:
        cc: [gcc, clang]
    steps:
      - uses: actions/checkout@v4
      - name: Install toolchain
        run: |
          apt-get update
          apt-get install -y build-essential pkg-config valgrind
          if [ "${{ matrix.cc }}" = "clang" ]; then
            apt-get install -y clang
          fi
      - name: Unit + concurrent tests
        env:
          CC: ${{ matrix.cc }}
        run: |
          make test
          make test_concurrent
          make examples
          make bench/bench
      - name: TSAN (gcc only)
        if: matrix.cc == 'gcc'
        env:
          CC: gcc
        run: make test_tsan
      - name: Valgrind (gcc only)
        if: matrix.cc == 'gcc'
        env:
          CC: gcc
        run: make valgrind
